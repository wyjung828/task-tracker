<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>오늘의 업무</title>

  <!-- PWA Meta Tags for iPhone -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="업무플래너">
  <meta name="theme-color" content="#1e1b4b">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- PWA Manifest (inline) -->
  <link rel="manifest" href="data:application/json,{
    %22name%22:%22오늘의%20업무%20플래너%22,
    %22short_name%22:%22업무플래너%22,
    %22start_url%22:%22.%22,
    %22display%22:%22standalone%22,
    %22background_color%22:%22%231e1b4b%22,
    %22theme_color%22:%22%231e1b4b%22,
    %22orientation%22:%22portrait%22
  }">

  <style>
    :root {
      --indigo-deep: #1e1b4b;
      --indigo-mid: #312e81;
      --indigo-soft: #6366f1;
      --indigo-pale: #e0e7ff;
      --safe-top: env(safe-area-inset-top, 44px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overscroll-behavior: none; }

    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f1f5f9;
      color: #111827;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Header ── */
    #app-header {
      background: linear-gradient(160deg, #1e1b4b 0%, #3730a3 100%);
      padding: calc(var(--safe-top) + 12px) 20px 16px;
      color: white;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-row { display: flex; align-items: flex-start; justify-content: space-between; }
    .header-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; opacity: .45; margin-bottom: 3px; }
    .header-title { font-size: 22px; font-weight: 900; letter-spacing: -.5px; }
    .header-date { font-size: 11px; opacity: .45; margin-top: 3px; }
    .progress-block { text-align: right; }
    .progress-pct { font-size: 26px; font-weight: 900; line-height: 1; }
    .progress-sub { font-size: 10px; opacity: .45; margin-top: 2px; }
    .progress-bar { margin-top: 6px; width: 72px; height: 3px; background: rgba(255,255,255,.2); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: #a5b4fc; border-radius: 2px; transition: width .4s; }

    /* ── Tab Nav ── */
    .tab-nav {
      display: flex; gap: 3px;
      background: rgba(255,255,255,.1);
      border-radius: 10px; padding: 3px;
      margin-top: 12px;
    }
    .tab-btn {
      flex: 1; padding: 7px 0; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: all .15s;
      background: transparent; color: rgba(255,255,255,.6);
    }
    .tab-btn.active { background: white; color: var(--indigo-deep); }

    /* ── Scroll Area ── */
    #scroll-area {
      height: calc(100dvh - var(--safe-top) - 130px);
      overflow-y: auto;
      padding: 16px 14px calc(var(--safe-bottom) + 16px);
      -webkit-overflow-scrolling: touch;
    }

    /* ── MIT Banner ── */
    .mit-banner {
      background: linear-gradient(135deg, #1e1b4b, #4338ca);
      border-radius: 16px; padding: 16px;
      color: white; margin-bottom: 16px;
    }
    .mit-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .mit-title { font-size: 16px; font-weight: 900; }
    .mit-label { font-size: 9px; letter-spacing: 2px; opacity: .45; text-transform: uppercase; margin-bottom: 2px; }
    .mit-count { font-size: 24px; font-weight: 900; text-align: right; line-height: 1; }
    .mit-count span { font-size: 14px; opacity: .4; }
    .mit-slots { display: flex; gap: 6px; }
    .mit-slot {
      flex: 1; min-height: 48px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 10px; padding: 8px 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .mit-slot-empty { color: rgba(255,255,255,.25); font-size: 11px; }
    .mit-slot-text { font-size: 11px; font-weight: 700; line-height: 1.3; }
    .mit-slot-num { font-size: 14px; flex-shrink: 0; }

    /* ── Matrix Grid ── */
    .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ── Quadrant ── */
    .quadrant {
      border-radius: 14px; padding: 12px;
      display: flex; flex-direction: column; min-height: 160px;
    }
    .q-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .q-title-row { display: flex; align-items: center; gap: 5px; }
    .q-emoji { font-size: 16px; }
    .q-label { font-size: 13px; font-weight: 800; }
    .q-count { font-size: 10px; color: white; border-radius: 20px; padding: 1px 7px; font-weight: 700; }
    .q-sub { font-size: 10px; color: #9ca3af; margin-top: 2px; }
    .q-done-ratio { font-size: 10px; font-weight: 700; }
    .q-tasks { flex: 1; }
    .q-empty { text-align: center; padding: 12px 0; color: #d1d5db; font-size: 11px; }

    /* ── Task Card ── */
    .task-card {
      background: white; border-radius: 10px;
      padding: 10px; margin-bottom: 6px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 1px 2px rgba(0,0,0,.05);
      transition: box-shadow .15s;
    }
    .task-card.mit { border-color: #c7d2fe; box-shadow: 0 0 0 2px #6366f1; }
    .task-card.done { opacity: .55; }
    .task-inner { display: flex; align-items: flex-start; gap: 7px; }
    .task-check {
      width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px;
      border-radius: 5px; border: 2px solid #d1d5db;
      background: white; cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 900;
    }
    .task-check.checked { background: #10b981; border-color: #10b981; }
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 12px; font-weight: 600; line-height: 1.4; word-break: break-word; }
    .task-title.done { text-decoration: line-through; }
    .task-status-row { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
    .task-badge { font-size: 10px; padding: 1px 7px; border-radius: 20px; font-weight: 700; }
    .task-status-sel {
      font-size: 10px; border: 1px solid #e5e7eb; border-radius: 5px;
      padding: 1px 4px; background: white; color: #374151; cursor: pointer;
      font-family: inherit;
    }
    .task-actions { display: flex; gap: 3px; flex-shrink: 0; }
    .icon-btn {
      width: 26px; height: 26px; border-radius: 7px; border: none;
      background: #f3f4f6; cursor: pointer; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-btn.star-on { background: #eef2ff; color: #6366f1; }
    .icon-btn.del { color: #9ca3af; }

    /* ── Add Task Form ── */
    .add-form {
      background: #f8fafc; border-radius: 10px;
      padding: 10px; border: 1px dashed #cbd5e1;
      margin-bottom: 6px;
    }
    .add-input {
      width: 100%; border: none; outline: none; background: transparent;
      font-size: 13px; font-weight: 500; font-family: inherit;
      color: #111827; margin-bottom: 8px;
    }
    .add-input::placeholder { color: #9ca3af; }
    .add-btn-row { display: flex; gap: 5px; }
    .add-confirm {
      flex: 1; padding: 7px; border-radius: 8px; border: none;
      background: var(--indigo-deep); color: white;
      font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .add-cancel {
      padding: 7px 10px; border-radius: 8px;
      border: 1px solid #e5e7eb; background: white;
      font-size: 12px; cursor: pointer; color: #6b7280; font-family: inherit;
    }
    .q-add-btn {
      width: 100%; padding: 8px; margin-top: 8px;
      border-radius: 10px; border: 1px dashed;
      background: rgba(255,255,255,.6);
      font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: all .15s;
    }

    /* ── List View ── */
    .list-view { background: white; border-radius: 16px; border: 1px solid #e5e7eb; overflow: hidden; }
    .list-header { padding: 14px 16px; border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; justify-content: space-between; }
    .list-header-title { font-weight: 800; }
    .list-header-count { font-size: 12px; color: #9ca3af; }
    .list-section { padding: 12px 12px 0; }
    .list-section:last-child { padding-bottom: 12px; }
    .list-sec-title { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; }
    .list-empty { text-align: center; padding: 36px 20px; color: #d1d5db; }
    .list-empty-icon { font-size: 36px; margin-bottom: 8px; }

    /* ── Install Banner ── */
    #install-banner {
      display: none;
      position: fixed; bottom: calc(var(--safe-bottom) + 12px); left: 14px; right: 14px;
      background: white; border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      padding: 14px 16px; z-index: 200;
      border: 1px solid #e0e7ff;
      animation: slideUp .3s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .install-row { display: flex; align-items: center; gap: 12px; }
    .install-icon { width: 44px; height: 44px; background: linear-gradient(135deg, #1e1b4b, #6366f1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .install-text { flex: 1; }
    .install-title { font-size: 14px; font-weight: 800; color: #111827; }
    .install-desc { font-size: 11px; color: #6b7280; margin-top: 2px; line-height: 1.4; }
    .install-steps { margin-top: 12px; background: #f8fafc; border-radius: 10px; padding: 10px 12px; }
    .install-step { font-size: 11px; color: #374151; margin-bottom: 4px; display: flex; gap: 6px; }
    .install-step:last-child { margin-bottom: 0; }
    .install-step-num { font-weight: 800; color: #6366f1; flex-shrink: 0; }
    .install-close { position: absolute; top: 10px; right: 12px; background: none; border: none; font-size: 18px; color: #9ca3af; cursor: pointer; }

    /* ── Edit modal ── */
    #edit-modal {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.4); align-items: flex-end;
    }
    #edit-modal.open { display: flex; }
    .edit-sheet {
      background: white; border-radius: 20px 20px 0 0;
      padding: 20px 20px calc(var(--safe-bottom) + 20px);
      width: 100%;
    }
    .edit-sheet-title { font-size: 16px; font-weight: 800; margin-bottom: 12px; }
    .edit-textarea {
      width: 100%; border: 1px solid #e5e7eb; border-radius: 10px;
      padding: 10px 12px; font-size: 14px; font-family: inherit;
      outline: none; resize: none; min-height: 80px; color: #111827;
    }
    .edit-textarea:focus { border-color: #6366f1; }
    .edit-actions { display: flex; gap: 8px; margin-top: 10px; }
    .edit-save { flex: 1; padding: 12px; border: none; border-radius: 10px; background: var(--indigo-deep); color: white; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; }
    .edit-cancel { padding: 12px 16px; border: 1px solid #e5e7eb; border-radius: 10px; background: white; font-size: 14px; cursor: pointer; font-family: inherit; color: #6b7280; }

    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f1f5f9; }
      .task-card { background: #1e293b; border-color: #334155; }
      .task-title { color: #f1f5f9; }
      .task-check { background: #1e293b; }
      .icon-btn { background: #334155; color: #94a3b8; }
      .q-add-btn { background: rgba(255,255,255,.05) !important; }
      .list-view { background: #1e293b; border-color: #334155; }
      .list-header { border-color: #334155; }
      .add-form { background: #1e293b; border-color: #475569; }
      .add-input { color: #f1f5f9; }
      .task-status-sel { background: #1e293b; color: #f1f5f9; border-color: #475569; }
      .install-banner { background: #1e293b; border-color: #334155; }
      .install-steps { background: #0f172a; }
      .install-step { color: #94a3b8; }
      .edit-sheet { background: #1e293b; }
      .edit-textarea { background: #0f172a; border-color: #475569; color: #f1f5f9; }
    }
  </style>
</head>
<body>

<div id="app-header">
  <div class="header-row">
    <div>
      <div class="header-label">Daily Planner</div>
      <div class="header-title">오늘의 업무 🗓</div>
      <div class="header-date" id="today-date"></div>
    </div>
    <div class="progress-block">
      <div class="progress-pct" id="pct-text">0%</div>
      <div class="progress-sub" id="pct-sub">0/0 완료</div>
      <div class="progress-bar"><div class="progress-fill" id="pct-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('matrix')">📊 매트릭스</button>
    <button class="tab-btn" onclick="switchTab('list')">📋 전체 목록</button>
  </div>
</div>

<div id="scroll-area">
  <!-- MIT Banner -->
  <div class="mit-banner">
    <div class="mit-header">
      <div>
        <div class="mit-label">오늘의 핵심 업무</div>
        <div class="mit-title">MIT · Most Important Tasks</div>
      </div>
      <div>
        <div class="mit-count"><span id="mit-done">0</span><span>/3</span></div>
        <div style="font-size:10px;opacity:.4;text-align:right">완료</div>
      </div>
    </div>
    <div class="mit-slots" id="mit-slots"></div>
  </div>

  <!-- Matrix View -->
  <div id="matrix-view">
    <div class="matrix-grid" id="matrix-grid"></div>
    <div style="margin-top:12px;padding:12px;background:white;border-radius:12px;border:1px solid #e5e7eb;font-size:11px;color:#6b7280;line-height:1.8">
      <strong style="color:#374151">💡 사용 방법</strong><br>
      · ⭐ 버튼으로 MIT 지정 (최대 3개)<br>
      · 체크박스로 완료 처리<br>
      · 업무명 길게 누르면 수정 가능
    </div>
  </div>

  <!-- List View -->
  <div id="list-view" style="display:none">
    <div class="list-view" id="list-container"></div>
  </div>
</div>

<!-- Install Banner (iOS hint) -->
<div id="install-banner">
  <button class="install-close" onclick="document.getElementById('install-banner').style.display='none'">✕</button>
  <div class="install-row">
    <div class="install-icon">🗓</div>
    <div class="install-text">
      <div class="install-title">홈 화면에 앱으로 추가하기</div>
      <div class="install-desc">사파리에서 홈 화면에 추가하면 앱처럼 사용할 수 있어요!</div>
    </div>
  </div>
  <div class="install-steps">
    <div class="install-step"><span class="install-step-num">1.</span><span>아래 공유 버튼(□↑)을 탭하세요</span></div>
    <div class="install-step"><span class="install-step-num">2.</span><span>"홈 화면에 추가"를 선택하세요</span></div>
    <div class="install-step"><span class="install-step-num">3.</span><span>"추가" 버튼을 누르면 완료!</span></div>
  </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal">
  <div class="edit-sheet">
    <div class="edit-sheet-title">업무 수정</div>
    <textarea class="edit-textarea" id="edit-textarea" rows="3"></textarea>
    <div class="edit-actions">
      <button class="edit-cancel" onclick="closeEdit()">취소</button>
      <button class="edit-save" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<script>
const QUADRANTS = [
  { id: "do",       label: "즉시 실행",  emoji: "🔥", sub: "중요 + 긴급",   color: "#ef4444", bg: "#fef2f2", border: "#fecaca" },
  { id: "plan",     label: "일정 계획",  emoji: "📅", sub: "중요 + 여유",   color: "#3b82f6", bg: "#eff6ff", border: "#bfdbfe" },
  { id: "delegate", label: "위임",       emoji: "👥", sub: "긴급 + 덜중요", color: "#f59e0b", bg: "#fffbeb", border: "#fde68a" },
  { id: "eliminate",label: "제거 고려",  emoji: "🗑️", sub: "덜중요 + 여유", color: "#9ca3af", bg: "#f9fafb", border: "#e5e7eb" },
];
const STATUS = {
  todo:       { label: "할 일",   color: "#6b7280", bg: "#f3f4f6" },
  inprogress: { label: "진행 중", color: "#3b82f6", bg: "#dbeafe" },
  done:       { label: "완료",    color: "#10b981", bg: "#d1fae5" },
};

let tasks = [];
let activeTab = "matrix";
let addingQuadrant = null;
let editingId = null;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function save() {
  try { localStorage.setItem("tasks_v2", JSON.stringify(tasks)); } catch(e) {}
}
function load() {
  try {
    const d = localStorage.getItem("tasks_v2");
    if (d) tasks = JSON.parse(d);
  } catch(e) {}
}

function mitTasksSorted() {
  return tasks.filter(t => t.isMIT).sort((a,b) => a.mitOrder - b.mitOrder);
}

function updateProgress() {
  const total = tasks.length, done = tasks.filter(t => t.status === "done").length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("pct-text").textContent = pct + "%";
  document.getElementById("pct-sub").textContent = done + "/" + total + " 완료";
  document.getElementById("pct-fill").style.width = pct + "%";
  const mitDone = tasks.filter(t => t.isMIT && t.status === "done").length;
  document.getElementById("mit-done").textContent = mitDone;
}

function renderMIT() {
  const mitTasks = mitTasksSorted();
  const slots = document.getElementById("mit-slots");
  slots.innerHTML = "";
  for (let i = 0; i < 3; i++) {
    const t = mitTasks[i];
    const div = document.createElement("div");
    div.className = "mit-slot";
    if (t) {
      div.innerHTML = `<span class="mit-slot-num">${t.status === "done" ? "✅" : (i+1)}</span>
        <span class="mit-slot-text" style="opacity:${t.status === "done" ? ".5" : "1"};text-decoration:${t.status === "done" ? "line-through" : "none"}">${escHtml(t.title)}</span>`;
    } else {
      div.innerHTML = `<span class="mit-slot-empty">MIT ${i+1} 미지정</span>`;
    }
    slots.appendChild(div);
  }
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderMatrix() {
  const grid = document.getElementById("matrix-grid");
  grid.innerHTML = "";
  QUADRANTS.forEach(q => {
    const qTasks = tasks.filter(t => t.quadrant === q.id);
    const doneCnt = qTasks.filter(t => t.status === "done").length;
    const col = document.createElement("div");
    col.className = "quadrant";
    col.style.cssText = `background:${q.bg};border:1px solid ${q.border}`;

    let tasksHtml = qTasks.map(t => taskCardHtml(t)).join("");
    if (addingQuadrant === q.id) {
      tasksHtml = `<div class="add-form">
        <input class="add-input" id="add-input-${q.id}" placeholder="업무 내용 입력..." autocomplete="off">
        <div class="add-btn-row">
          <button class="add-confirm" onclick="confirmAdd('${q.id}')">추가</button>
          <button class="add-cancel" onclick="cancelAdd()">취소</button>
        </div>
      </div>` + tasksHtml;
    }

    col.innerHTML = `
      <div class="q-header">
        <div>
          <div class="q-title-row">
            <span class="q-emoji">${q.emoji}</span>
            <span class="q-label" style="color:${q.color}">${q.label}</span>
            <span class="q-count" style="background:${q.color}">${qTasks.length}</span>
          </div>
          <div class="q-sub">${q.sub}</div>
        </div>
        ${qTasks.length ? `<div class="q-done-ratio" style="color:${q.color}">${doneCnt}/${qTasks.length}</div>` : ""}
      </div>
      <div class="q-tasks">${tasksHtml || '<div class="q-empty">업무 없음</div>'}</div>
      <button class="q-add-btn" style="color:${q.color};border-color:${q.border}" onclick="startAdd('${q.id}')">+ 업무 추가</button>
    `;
    grid.appendChild(col);

    if (addingQuadrant === q.id) {
      setTimeout(() => {
        const inp = document.getElementById("add-input-" + q.id);
        if (inp) inp.focus();
      }, 50);
    }
  });
}

function taskCardHtml(t) {
  const s = STATUS[t.status] || STATUS.todo;
  const checked = t.status === "done";
  return `<div class="task-card${t.isMIT ? " mit" : ""}${checked ? " done" : ""}" id="tc-${t.id}">
    <div class="task-inner">
      <div class="task-check${checked ? " checked" : ""}" onclick="toggleDone('${t.id}')">${checked ? "✓" : ""}</div>
      <div class="task-body">
        <div class="task-title${checked ? " done" : ""}" oncontextmenu="openEdit('${t.id}');return false;" onclick="openEdit('${t.id}')">${escHtml(t.title)}</div>
        <div class="task-status-row">
          <span class="task-badge" style="background:${s.bg};color:${s.color}">${s.label}</span>
          <select class="task-status-sel" onchange="setStatus('${t.id}',this.value)">
            <option value="todo"${t.status==="todo"?" selected":""}>할 일</option>
            <option value="inprogress"${t.status==="inprogress"?" selected":""}>진행 중</option>
            <option value="done"${t.status==="done"?" selected":""}>완료</option>
          </select>
        </div>
      </div>
      <div class="task-actions">
        <button class="icon-btn${t.isMIT ? " star-on" : ""}" onclick="toggleMIT('${t.id}')" title="MIT 지정">⭐</button>
        <button class="icon-btn del" onclick="deleteTask('${t.id}')">✕</button>
      </div>
    </div>
  </div>`;
}

function renderList() {
  const con = document.getElementById("list-container");
  if (!tasks.length) {
    con.innerHTML = `<div class="list-header"><span class="list-header-title">전체 업무 목록</span><span class="list-header-count">0개</span></div>
      <div class="list-empty"><div class="list-empty-icon">📝</div>매트릭스에서 업무를 추가해보세요</div>`;
    return;
  }
  let html = `<div class="list-header"><span class="list-header-title">전체 업무 목록</span><span class="list-header-count">${tasks.length}개</span></div>`;
  QUADRANTS.forEach(q => {
    const qTasks = tasks.filter(t => t.quadrant === q.id);
    if (!qTasks.length) return;
    html += `<div class="list-section">
      <div class="list-sec-title">
        <span>${q.emoji}</span>
        <span style="font-size:13px;font-weight:800;color:${q.color}">${q.label}</span>
        <span style="font-size:11px;color:#9ca3af">(${qTasks.length})</span>
      </div>
      ${qTasks.map(t => taskCardHtml(t)).join("")}
    </div>`;
  });
  con.innerHTML = html;
}

function render() {
  updateProgress();
  renderMIT();
  if (activeTab === "matrix") renderMatrix();
  else renderList();
}

// Actions
function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.status = t.status === "done" ? "todo" : "done";
  save(); render();
}

function setStatus(id, val) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.status = val;
  save(); render();
}

function toggleMIT(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  if (t.isMIT) {
    t.isMIT = false; t.mitOrder = 0;
  } else {
    const cnt = tasks.filter(x => x.isMIT).length;
    if (cnt >= 3) { alert("MIT는 최대 3개까지 지정할 수 있습니다!"); return; }
    t.isMIT = true; t.mitOrder = cnt + 1;
  }
  save(); render();
}

function deleteTask(id) {
  if (!confirm("이 업무를 삭제할까요?")) return;
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}

function startAdd(qId) { addingQuadrant = qId; render(); }
function cancelAdd() { addingQuadrant = null; render(); }
function confirmAdd(qId) {
  const inp = document.getElementById("add-input-" + qId);
  const title = inp ? inp.value.trim() : "";
  if (!title) return;
  tasks.push({ id: uid(), title, quadrant: qId, status: "todo", isMIT: false, mitOrder: 0, createdAt: Date.now() });
  addingQuadrant = null;
  save(); render();
}

// Edit modal
function openEdit(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById("edit-textarea").value = t.title;
  document.getElementById("edit-modal").classList.add("open");
  setTimeout(() => document.getElementById("edit-textarea").focus(), 100);
}
function closeEdit() {
  editingId = null;
  document.getElementById("edit-modal").classList.remove("open");
}
function saveEdit() {
  const t = tasks.find(t => t.id === editingId);
  if (!t) { closeEdit(); return; }
  const val = document.getElementById("edit-textarea").value.trim();
  if (val) t.title = val;
  closeEdit(); save(); render();
}

// Tab switch
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab-btn").forEach((b,i) => {
    b.classList.toggle("active", (i === 0 && tab === "matrix") || (i === 1 && tab === "list"));
  });
  document.getElementById("matrix-view").style.display = tab === "matrix" ? "" : "none";
  document.getElementById("list-view").style.display = tab === "list" ? "" : "none";
  render();
}

// Date
function setDate() {
  const now = new Date();
  document.getElementById("today-date").textContent = now.toLocaleDateString("ko-KR", { year: "numeric", month: "long", day: "numeric", weekday: "long" });
}

// iOS install banner
function checkInstallBanner() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  const dismissed = localStorage.getItem("install_dismissed");
  if (isIOS && !isStandalone && !dismissed) {
    setTimeout(() => {
      document.getElementById("install-banner").style.display = "block";
    }, 2000);
  }
}
document.getElementById("install-banner").addEventListener("click", function(e) {
  if (e.target.classList.contains("install-close")) {
    localStorage.setItem("install_dismissed", "1");
  }
});

// Keyboard shortcuts for add form
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") { cancelAdd(); closeEdit(); }
});
document.getElementById("edit-modal").addEventListener("click", function(e) {
  if (e.target === this) closeEdit();
});

// Init
load();
setDate();
render();
checkInstallBanner();
</script>
</body>
</html>
